name: Service Registry CI

on:
  push:
    paths:
      - 'service-registry/**'
      - '.github/workflows/service-registry-ci.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Service Registry
        run: |
          cd service-registry
          mvn clean package -DskipTests

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin    

      - name: Build Docker Image
        run: |
          cd service-registry
          docker build -t saketkrishna18/service-registry:latest .

      - name: Push Docker Image
        run: docker push saketkrishna18/service-registry:latest